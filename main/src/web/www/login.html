<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NFC路灯控制器登录</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="login-wrap">
    <section class="login-card">
      <h1>NFC路灯控制器</h1>
      <form id="login_form" method="post" action="/login">
        <label>登录密码</label>
        <input type="password" id="password" name="password" minlength="8" maxlength="63" autocomplete="current-password" required>
        <button class="btn" id="login_btn" type="submit">登录</button>
        <div id="login_error" class="error"></div>
      </form>
    </section>
  </main>
  <script src="/login.js"></script>
</body>
</html>
